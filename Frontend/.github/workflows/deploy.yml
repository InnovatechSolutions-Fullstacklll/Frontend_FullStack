name: proyecto fullstack

on:
  push:
    branches:
      - deploy
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'package.json'
      - '.github/workflows/**'

jobs:
  audit-and-lint:
    name: 🛡️ Audit & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Validar Formato y Linting
        run: npm run lint

      - name: Auditoría de Seguridad (npm audit)
        run: npm audit --audit-level=high

  test-frontend:
    name: 🧪 Pruebas Frontend
    runs-on: ubuntu-latest
    needs: audit-and-lint
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Ejecutar Pruebas Unitarias
        run: npm run test:frontend -- --watchAll=false --maxWorkers=50%

  test-backend:
    name: 🧪 Pruebas Backend
    runs-on: ubuntu-latest
    needs: audit-and-lint
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Ejecutar Pruebas Backend
        run: npm run test:backend
        env:
          NODE_ENV: test
          DATABASE_URL: sqlite://:memory:

  build-and-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    environment: production
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependencias de Producción
        run: npm ci

      - name: Construir Aplicación (Build)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Desplegar a Servidor de Producción
        run: |
          echo "Iniciando el despliegue del proyecto Fullstack..."
          echo "Compilación completada exitosamente."
          echo "Enviando artefactos al entorno de producción..."
          # NOTA: Aquí debes integrar el comando o acción específica de tu proveedor de hosting
          # (por ejemplo, AWS, Vercel, Netlify, Railway, Heroku, Docker, o SCP/SSH a tu propio VPS).
          echo "¡Despliegue finalizado con éxito!"

  notify:
    name: 📢 Notificación de Estado
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    steps:
      - name: Reportar Resultado
        run: |
          if [ "${{ needs.build-and-deploy.result }}" = "success" ]; then
            echo "El pipeline se ejecutó correctamente y el proyecto está en vivo."
          else
            echo "El pipeline falló. Por favor revisa los logs de los jobs anteriores."
            exit 1
          fi